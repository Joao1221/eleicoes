      <rect x="44" y="194" width="132" height="106" rx="12" fill="#c3c9ce"/>
      <rect x="186" y="194" width="108" height="106" rx="12" fill="#c3c9ce"/>

      <g fill="#2e3942">
        <rect x="58" y="207" width="28" height="18" rx="5"/>
        <rect x="92" y="207" width="28" height="18" rx="5"/>
        <rect x="126" y="207" width="28" height="18" rx="5"/>
        <rect x="58" y="230" width="28" height="18" rx="5"/>
        <rect x="92" y="230" width="28" height="18" rx="5"/>
        <rect x="126" y="230" width="28" height="18" rx="5"/>
        <rect x="58" y="253" width="28" height="18" rx="5"/>
        <rect x="92" y="253" width="28" height="18" rx="5"/>
        <rect x="126" y="253" width="28" height="18" rx="5"/>
      </g>

      <g fill="#2a333b" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700">
        <text x="72" y="220" text-anchor="middle" fill="#fff">1</text>
        <text x="106" y="220" text-anchor="middle" fill="#fff">2</text>
        <text x="140" y="220" text-anchor="middle" fill="#fff">3</text>
        <text x="72" y="243" text-anchor="middle" fill="#fff">4</text>
        <text x="106" y="243" text-anchor="middle" fill="#fff">5</text>
        <text x="140" y="243" text-anchor="middle" fill="#fff">6</text>
        <text x="72" y="266" text-anchor="middle" fill="#fff">7</text>
        <text x="106" y="266" text-anchor="middle" fill="#fff">8</text>
        <text x="140" y="266" text-anchor="middle" fill="#fff">9</text>
      </g>

      <rect x="192" y="206" width="74" height="20" rx="6" fill="url(#buttonGreen)"/>
      <rect x="192" y="232" width="74" height="20" rx="6" fill="url(#buttonOrange)"/>
      <rect x="192" y="258" width="34" height="20" rx="6" fill="url(#buttonRed)"/>
      <rect x="232" y="258" width="34" height="20" rx="6" fill="#e0e6ea"/>
      <text x="229" y="220" text-anchor="middle" fill="#0b2616" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700">CONFIRMA</text>
      <text x="229" y="246" text-anchor="middle" fill="#301700" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700">CORRIGE</text>
      <text x="209" y="272" text-anchor="middle" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700">BRANCO</text>
      <text x="249" y="272" text-anchor="middle" fill="#18303f" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700">APAGA</text>

      <rect x="28" y="320" width="286" height="76" rx="12" fill="#10191f" stroke="#2f3d45" stroke-width="2"/>
      <rect x="36" y="328" width="270" height="60" rx="8" fill="#16363d"/>
      <path d="M49 357 C83 332, 120 328, 154 340 S226 365, 286 344" fill="none" stroke="#9ae3ff" stroke-opacity=".35" stroke-width="2"/>
      <path d="M56 368 C92 360, 126 362, 152 371 S206 385, 282 367" fill="none" stroke="#77ffb8" stroke-opacity=".3" stroke-width="2"/>
      <text x="52" y="341" fill="#d9f0ff" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700">ESTADO DE SERGIPE - ARACAJU</text>
      <text x="242" y="341" fill="#d9f0ff" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700">ZONA 1 - SECAO 102</text>
