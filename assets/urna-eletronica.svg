    <g transform="translate(588 36)">
      <rect x="0" y="10" width="182" height="322" rx="32" fill="url(#panel)" stroke="#8cf3df" stroke-width="3"/>
      <rect x="13" y="24" width="156" height="294" rx="24" fill="none" stroke="#ffffff" stroke-opacity=".28" stroke-width="2"/>
      <circle cx="91" cy="106" r="28" fill="#1f8f53" opacity=".9"/>
      <circle cx="91" cy="106" r="18" fill="#ffd24a" opacity=".95"/>
      <path d="M91 84 L95 98 L109 98 L97 107 L102 121 L91 112 L80 121 L85 107 L73 98 L87 98 Z" fill="#0d6637"/>
      <text x="91" y="180" text-anchor="middle" fill="#0f4c26" font-family="Arial, Helvetica, sans-serif" font-size="33" font-weight="800">BRASIL</text>
      <text x="91" y="211" text-anchor="middle" fill="#172026" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">URNA ELETRONICA</text>
    </g>

    <path d="M32 26 C48 10, 78 6, 96 12" fill="none" stroke="#e9fffb" stroke-opacity=".55" stroke-width="6" filter="url(#blur20)"/>
    <path d="M34 24 C54 9, 86 7, 98 11" fill="none" stroke="#8df3df" stroke-opacity=".7" stroke-width="2"/>
  </g>
