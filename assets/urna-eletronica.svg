<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" role="img" aria-labelledby="title desc">
  <title>Urna eletronica</title>
  <desc>Ilustracao de uma urna eletronica sobre pedestal metalico com brilho suave.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05141f"/>
      <stop offset="45%" stop-color="#071b26"/>
      <stop offset="100%" stop-color="#02070b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6ef3c5" stop-opacity=".8"/>
      <stop offset="35%" stop-color="#5bd9ff" stop-opacity=".32"/>
      <stop offset="100%" stop-color="#5bd9ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3f5f7"/>
      <stop offset="18%" stop-color="#d4d9dd"/>
      <stop offset="52%" stop-color="#adb5bc"/>
      <stop offset="100%" stop-color="#eef1f3"/>
    </linearGradient>
    <linearGradient id="metalDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6f7880"/>
      <stop offset="50%" stop-color="#3a424a"/>
      <stop offset="100%" stop-color="#8f979e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12212c"/>
      <stop offset="100%" stop-color="#071018"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2f3f4"/>
      <stop offset="25%" stop-color="#c9cfd3"/>
      <stop offset="68%" stop-color="#8c949c"/>
      <stop offset="100%" stop-color="#eceff1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8cf8d5"/>
      <stop offset="100%" stop-color="#28c8ff"/>
    </linearGradient>
    <linearGradient id="pedestal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8b0b8"/>
      <stop offset="100%" stop-color="#5f6870"/>
    </linearGradient>
    <linearGradient id="buttonGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5ef29e"/>
      <stop offset="100%" stop-color="#1dbf63"/>
    </linearGradient>
    <linearGradient id="buttonOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb26d"/>
      <stop offset="100%" stop-color="#ff7b3e"/>
    </linearGradient>
    <linearGradient id="buttonRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8b8b"/>
      <stop offset="100%" stop-color="#e74a4a"/>
    </linearGradient>
    <filter id="blur40" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="blur20" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000" flood-opacity=".55"/>
    </filter>
  </defs>

  <rect width="1024" height="576" fill="url(#bg)"/>
  <ellipse cx="180" cy="110" rx="250" ry="90" fill="url(#glow)" filter="url(#blur40)" opacity=".7"/>
  <ellipse cx="840" cy="170" rx="250" ry="100" fill="url(#glow)" filter="url(#blur40)" opacity=".55"/>
  <path d="M-30 455 C180 390, 330 405, 522 454 S860 520, 1080 430" fill="none" stroke="#8ff2d7" stroke-opacity=".35" stroke-width="6" filter="url(#blur20)"/>
  <path d="M-10 495 C175 430, 360 444, 528 492 S853 552, 1085 458" fill="none" stroke="#6bd7ff" stroke-opacity=".16" stroke-width="4" filter="url(#blur20)"/>

  <g transform="translate(162 72)" filter="url(#shadow)">
    <ellipse cx="360" cy="360" rx="285" ry="42" fill="#000" opacity=".42" filter="url(#blur40)"/>

    <rect x="74" y="260" width="620" height="104" rx="24" fill="url(#pedestal)"/>
    <rect x="96" y="246" width="576" height="18" rx="9" fill="#cfd4d8" opacity=".9"/>
    <rect x="118" y="280" width="532" height="52" rx="10" fill="#83919b" opacity=".35"/>

    <g transform="translate(152 22)">
