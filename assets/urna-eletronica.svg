      <text x="167" y="79" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700">VOTO PARA PRESIDENTE</text>

      <text x="71" y="111" fill="#e3ebf0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">CANDIDATO</text>
      <text x="71" y="149" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700">99</text>
      <circle cx="190" cy="126" r="24" fill="url(#accent)" opacity=".85"/>
      <circle cx="190" cy="118" r="11" fill="#0f2230"/>
      <path d="M173 153 C180 141, 201 141, 208 153 C210 156, 213 164, 213 170 H168 C168 164, 171 156, 173 153Z" fill="#0f2230"/>
      <path d="M218 112 C234 118, 247 129, 254 145 C234 138, 221 126, 218 112Z" fill="#3cc7ff" opacity=".75" filter="url(#blur20)"/>
      <text x="167" y="194" text-anchor="middle" fill="#6cf3a8" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">VOTO CONFIRMADO</text>

