      <rect x="38" y="22" width="258" height="152" rx="18" fill="url(#screen)" stroke="#b0b8bf" stroke-width="2"/>
      <rect x="48" y="32" width="238" height="132" rx="12" fill="#0d1620" stroke="#173042" stroke-width="1.5"/>

